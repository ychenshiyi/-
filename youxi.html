            { en: "Theory", cn: "理论" }, { en: "Threshold", cn: "阈值/门槛" },
            { en: "Ticket", cn: "票据" }, { en: "Title", cn: "标题" },
            { en: "Topic", cn: "话题" }, { en: "Tower", cn: "塔" },
            { en: "Track", cn: "轨道" }, { en: "Traffic", cn: "交通" },
            { en: "Trail", cn: "小径" }, { en: "Transaction", cn: "交易" },
            { en: "Transfer", cn: "转移" }, { en: "Transit", cn: "运输" },
            { en: "Transmission", cn: "传输" }, { en: "Transport", cn: "运输" },
            { en: "Triangle", cn: "三角形" }, { en: "Trigger", cn: "扳机/触发" },
            { en: "Trophy", cn: "奖杯" }, { en: "Tube", cn: "管子" },
            { en: "Tunnel", cn: "隧道" }, { en: "Turbine", cn: "涡轮" }
        ];

        let gameState = {
            cards: [],
            currentTurn: 'red',
            gameOver: false,
            winner: null,
            reason: ""
        };
        let isSpymaster = false;
        let roomId = "default-room";
        let currentUser = null;
        let unsubscribeRoom = null;

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth failed:", error);
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) startRoomListener();
        });

        function startRoomListener() {
            if (unsubscribeRoom) unsubscribeRoom();
            const roomDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
            unsubscribeRoom = onSnapshot(roomDocRef, (docSnap) => {
                if (docSnap.exists()) {
                    gameState = docSnap.data();
                    renderBoard();
                    updateUI();
                } else if (isSpymaster) {
                    createNewGame();
                }
            });
        }

        window.createNewGame = async () => {
            if (!currentUser) return;
            const shuffledWords = [...wordPool].sort(() => 0.5 - Math.random()).slice(0, 25);
            let roles = [
                ...Array(8).fill('red'),
                ...Array(8).fill('blue'),
                ...Array(8).fill('green'),
                'black'
            ].sort(() => 0.5 - Math.random());

            const newCards = shuffledWords.map((wordObj, i) => ({
                word: wordObj.en,
                cn: wordObj.cn,
                role: roles[i],
                revealed: false
            }));

            const newState = {
                cards: newCards,
                currentTurn: 'red',
                gameOver: false,
                winner: null,
                reason: ""
            };

            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId), newState);
        };

        window.handleCardClick = async (index) => {
            if (!currentUser || gameState.gameOver || isSpymaster || gameState.cards[index].revealed) return;

            const updatedCards = JSON.parse(JSON.stringify(gameState.cards));
            const card = updatedCards[index];
            card.revealed = true;

            let nextTurn = gameState.currentTurn;
            let gameOver = false;
            let winner = null;
            let reason = "";

            if (card.role === 'black') {
                gameOver = true;
                winner = gameState.currentTurn === 'red' ? 'blue' : 'red';
                reason = "点击了刺客词 (Assassin)！";
            } else if (card.role === 'green') {
                nextTurn = gameState.currentTurn === 'red' ? 'blue' : 'red';
            } else if (card.role !== gameState.currentTurn) {
                nextTurn = gameState.currentTurn === 'red' ? 'blue' : 'red';
            }

            const redLeft = updatedCards.filter(c => c.role === 'red' && !c.revealed).length;
            const blueLeft = updatedCards.filter(c => c.role === 'blue' && !c.revealed).length;
            if (redLeft === 0) { gameOver = true; winner = 'red'; reason = "红队找齐了所有单词！"; }
            else if (blueLeft === 0) { gameOver = true; winner = 'blue'; reason = "蓝队找齐了所有单词！"; }

            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId), {
                cards: updatedCards, currentTurn: nextTurn, gameOver, winner, reason
            });
        };

        window.endTurn = async () => {
            if (!currentUser) return;
            const nextTurn = gameState.currentTurn === 'red' ? 'blue' : 'red';
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId), { currentTurn: nextTurn });
        };

        function renderBoard() {
            const grid = document.getElementById('gameGrid');
            if (!grid) return;
            grid.innerHTML = '';
            
            if (!gameState.cards || gameState.cards.length === 0) {
                grid.innerHTML = '<div class="col-span-5 text-center p-10 text-slate-400">点击右上方重置对局...</div>';
                return;
            }

            gameState.cards.forEach((card, index) => {
                const div = document.createElement('div');
                div.className = `card flex flex-col items-center justify-center rounded-lg shadow-sm font-bold text-center p-1 transition-all duration-300 border-2 select-none cursor-pointer overflow-hidden`;
                
                if (card.revealed || isSpymaster) {
                    const roleColors = {
                        red: 'bg-red-500 text-white border-transparent',
                        blue: 'bg-blue-500 text-white border-transparent',
                        green: 'bg-emerald-500 text-white border-transparent',
                        black: 'bg-gray-800 text-white border-transparent'
                    };
                    div.className += ` ${roleColors[card.role]}`;
                    if (card.revealed) div.className += ' ring-4 ring-yellow-400 ring-opacity-50';
                } else {
                    div.className += ' bg-white text-gray-800 border-gray-200 hover:border-indigo-400';
                }

                const enSpan = document.createElement('span');
                enSpan.className = 'text-[10px] sm:text-xs md:text-sm uppercase tracking-tighter sm:tracking-wide leading-none text-center px-1';
                enSpan.innerText = card.word;
                div.appendChild(enSpan);

                const cnSpan = document.createElement('span');
                cnSpan.className = 'text-[9px] sm:text-[10px] opacity-75 font-normal mt-1 leading-none text-center';
                cnSpan.innerText = card.cn || '';
                div.appendChild(cnSpan);

                div.onclick = () => window.handleCardClick(index);
                grid.appendChild(div);
            });
        }

        function updateUI() {
            const turnEl = document.getElementById('currentTurnDisplay');
            if (turnEl) {
                turnEl.innerText = gameState.currentTurn === 'red' ? "红色组回合" : "蓝色组回合";
                turnEl.className = `font-bold uppercase tracking-widest ${gameState.currentTurn === 'red' ? 'text-red-600' : 'text-blue-600'}`;
            }

            document.getElementById('redCount').innerText = gameState.cards.filter(c => c.role === 'red' && !c.revealed).length;
            document.getElementById('blueCount').innerText = gameState.cards.filter(c => c.role === 'blue' && !c.revealed).length;

            const msgBox = document.getElementById('msgBox');
            if (gameState.gameOver) {
                msgBox.innerHTML = `游戏结束！<br><span class="${gameState.winner === 'red' ? 'text-red-600' : 'text-blue-600'}">${gameState.winner.toUpperCase()} 队获胜！</span><br><span class="text-sm font-normal text-gray-500">${gameState.reason}</span>`;
                msgBox.classList.remove('hidden');
            } else {
                msgBox.classList.add('hidden');
            }
        }

        window.toggleIdentity = () => {
            isSpymaster = !isSpymaster;
            document.getElementById('idBtn').innerText = isSpymaster ? "模式：Operative" : "模式：Spymaster";
            document.getElementById('roleBadge').innerText = isSpymaster ? "SPYMASTER" : "OPERATIVE";
            renderBoard();
        };

        window.joinRoom = () => {
            const input = document.getElementById('roomInput').value.trim();
            if (input) {
                roomId = input;
                if (currentUser) startRoomListener();
            }
        };

        initAuth();
    </script>
    <style>
        .card { min-height: 75px; }
        @media (max-width: 640px) { .card { min-height: 60px; } }
    </style>

            <input id="roomInput" type="text" placeholder="房间ID" class="border border-slate-300 px-3 py-1 rounded-lg text-sm w-24 focus:ring-2 focus:ring-indigo-500 outline-none">
            <button onclick="joinRoom()" class="bg-indigo-600 text-white px-3 py-1 rounded-lg text-sm font-semibold hover:bg-indigo-700">进入</button>
        </div>
        <div id="roleBadge" class="text-[10px] font-black text-slate-400 px-3 py-1 bg-slate-50 rounded-full border border-slate-100 uppercase tracking-widest">OPERATIVE</div>
        <div class="flex gap-2">
            <button onclick="toggleIdentity()" id="idBtn" class="bg-slate-800 text-white px-3 py-1 rounded-lg text-sm font-semibold">模式：Spymaster</button>
            <button onclick="createNewGame()" class="bg-emerald-600 text-white px-3 py-1 rounded-lg text-sm font-black">RESET</button>
        </div>
    </div>

    <!-- 状态 -->
    <div class="max-w-4xl w-full mb-4 grid grid-cols-3 gap-2 sm:gap-4">
        <div class="bg-white p-2 rounded-2xl shadow-sm border border-slate-200 flex items-center justify-center">
            <span id="currentTurnDisplay" class="text-[10px] sm:text-xs font-bold text-slate-400">WAITING...</span>
        </div>
        <div class="bg-red-50 p-2 rounded-2xl border-b-4 border-red-500 flex flex-col items-center">
            <span class="text-red-700 font-black text-[10px] uppercase">RED</span>
            <span id="redCount" class="text-xl sm:text-2xl font-black text-red-600 leading-none">0</span>
        </div>
        <div class="bg-blue-50 p-2 rounded-2xl border-b-4 border-blue-500 flex flex-col items-center">
            <span class="text-blue-700 font-black text-[10px] uppercase">BLUE</span>
            <span id="blueCount" class="text-xl sm:text-2xl font-black text-blue-600 leading-none">0</span>
        </div>
    </div>

    <!-- 网格 -->
    <div id="gameGrid" class="grid grid-cols-5 gap-1 sm:gap-3 max-w-4xl w-full"></div>

    <!-- 消息 -->
    <div id="msgBox" class="mt-6 p-4 bg-white rounded-2xl shadow-xl text-center border-4 border-indigo-500 hidden animate-bounce z-10"></div>

    <!-- 操作 -->
    <div class="mt-6 flex flex-col items-center gap-2">
        <button onclick="endTurn()" class="bg-amber-500 text-white px-8 py-2 rounded-full font-black shadow-lg hover:bg-amber-600 active:scale-95 text-xs uppercase tracking-widest">
            End Turn
        </button>
        <p class="text-[9px] text-slate-400 uppercase font-bold tracking-tighter">Concrete Dictionary: Infrastructure, Science & Objects</p>
    </div>

</body>
</html>
